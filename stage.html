<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title data-i18n="stage.pageTitle"></title>
        <meta name="description" data-i18n-content="stage.metaDescription"
            content="">
        <meta name="author" content="Kheir-eddine Abdellah">
        <meta name="theme-color" content="#101312">
        <meta name="theme-color" media="(prefers-color-scheme: light)"
            content="#f4f8ff">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="preconnect" href="https://kit.fontawesome.com">
        <link rel="preconnect" href="https://cdnjs.cloudflare.com">
        <link rel="stylesheet" href="styles/main.css">
        <link rel="stylesheet" href="styles/terminal.css">
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Ubuntu+Condensed&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Do+Hyeon&display=swap">
        <script src="https://kit.fontawesome.com/9a6b0f1631.js"
            crossorigin="anonymous" defer></script>
        <link rel="icon" type="image/png" href="media/icon.png">
    </head>
    <body>
        <canvas id="particles-bg"></canvas>
        <div class="site-fade visible" id="site-fade">
            <header class="main-nav">
                <nav>
                    <div class="logo">PorteFolio K.A.</div>
                    <button type="button" class="nav-toggle-btn"
                        aria-label=""
                        data-i18n-aria-label="nav.menuToggleLabel"
                        aria-controls="main-menu"
                        aria-expanded="false">
                        <i class="fa-solid fa-bars nav-icon-open"
                            aria-hidden="true"></i>
                        <i class="fa-solid fa-xmark nav-icon-close"
                            aria-hidden="true"></i>
                    </button>
                    <ul id="main-menu">
                        <li class="nav-link-item"><a href="index.html#header"
                                data-i18n="nav.presentation"></a></li>
                        <li class="nav-link-item"><a href="index.html#projets"
                                data-i18n="nav.projects"></a></li>
                        <li class="nav-link-item"><a href="stage.html"
                                data-i18n="nav.stage"></a></li>
                        <li class="nav-link-item"><a href="index.html#loisirs"
                                data-i18n="nav.hobbies"></a></li>
                        <li class="nav-link-item"><a href="index.html#contacts"
                                data-i18n="nav.contact"></a></li>
                        <li class="language-toggle-item">
                            <button type="button" id="language-toggle-btn"
                                class="language-toggle-btn"
                                data-language-toggle
                                aria-label=""
                                title=""></button>
                        </li>
                        <li class="theme-toggle-item">
                            <button type="button" id="theme-toggle-btn"
                                class="theme-toggle-btn" data-theme-toggle
                                aria-pressed="false"
                                aria-label="">
                                <i class="theme-icon-sun"
                                    aria-hidden="true"
                                    style="font-style: normal; font-size: x-large;">☀︎</i>
                                <i class="fa-solid fa-moon theme-icon-moon"
                                    aria-hidden="true"></i>
                                <span class="sr-only"
                                    data-i18n="theme.srOnly"></span>
                            </button>
                        </li>
                        <li class="console-open-item">
                            <button type="button"
                                class="header-console-btn"
                                data-console-open
                                aria-label=""
                                title="">
                                <i class="fa-solid fa-terminal"
                                    aria-hidden="true"></i>
                            </button>
                        </li>
                    </ul>
                </nav>
            </header>

            <main>
                <section class="header" id="stage-header">
                    <div class="presentation">
                        <div class="title">
                            <i class="card-icon fa-solid fa-briefcase"></i>
                            <h1 data-i18n="stage.title"></h1>
                        </div>
                        <hr class="separator">
                        <p data-i18n-html="stage.intro"></p>
                    </div>

                    <div class="skills">
                        <div class="title">
                            <i class="card-icon fa-solid fa-book-open"></i>
                            <h1 data-i18n="stage.presentation.title"></h1>
                        </div>
                        <hr class="separator">
                        <p data-i18n-html="stage.presentation.body"></p>
                    </div>

                    <div class="etudes">
                        <div class="title">
                            <i class="card-icon fa-solid fa-list-check"></i>
                            <h1 data-i18n="stage.projectDescription.title"></h1>
                        </div>
                        <hr class="separator">
                        <p data-i18n-html="stage.projectDescription.body"></p>
                    </div>

                    <div class="etudes">
                        <div class="title">
                            <i class="card-icon fa-solid fa-code"></i>
                            <h1 data-i18n="stage.development.title"></h1>
                        </div>
                        <hr class="separator">
                        <ul>
                            <li data-i18n-html="stage.development.nodeJs"></li>
                            <li data-i18n-html="stage.development.nginx"></li>
                            <li data-i18n-html="stage.development.pm2"></li>
                            <li data-i18n-html="stage.development.certbot"></li>
                            <li data-i18n-html="stage.development.frontend"></li>
                        </ul>
                    </div>

                    <div class="etudes">
                        <div class="title">
                            <i
                                class="card-icon fa-solid fa-clipboard-check"></i>
                            <h1 data-i18n="stage.bilan.title"></h1>
                        </div>
                        <hr class="separator">
                        <p data-i18n-html="stage.bilan.body"></p>
                    </div>
                </section>
            </main>

            <footer class="site-footer" id="footer">
                <div class="footer-inner">
                    <div class="footer-brand">
                        <p class="footer-logo">PorteFolio K.A.</p>
                        <hr class="separator">
                        <p class="footer-text"
                            data-i18n-html="footer.brandText"></p>
                    </div>

                    <section class="footer-cols">
                        <div class="footer-nav">
                            <p class="footer-title"
                                data-i18n="footer.title.navigation"></p>
                            <ul>
                                <li><a href="index.html#header"
                                        data-i18n="footer.nav.presentation"></a></li>
                                <li><a href="index.html#projets"
                                        data-i18n="footer.nav.projects"></a></li>
                                <li><a href="stage.html"
                                        data-i18n="footer.nav.stage"></a></li>
                                <li><a href="index.html#loisirs"
                                        data-i18n="footer.nav.hobbies"></a></li>
                                <li><a href="index.html#contacts"
                                        data-i18n="footer.nav.contact"></a></li>
                            </ul>
                        </div>

                        <div class="footer-links">
                            <p class="footer-title"
                                data-i18n="footer.title.networks"></p>
                            <ul data-socials-list>
                            </ul>
                        </div>

                        <div class="footer-options">
                            <p class="footer-title"
                                data-i18n="footer.title.options"></p>
                            <ul>
                                <li>
                                    <button type="button"
                                        class="footer-action-btn footer-theme-toggle"
                                        data-theme-toggle
                                        aria-pressed="false"
                                        aria-label=""></button>
                                </li>
                                <li>
                                    <button type="button"
                                        class="footer-action-btn footer-language-toggle"
                                        data-language-toggle
                                        aria-label=""
                                        title=""></button>
                                </li>
                                <li>
                                    <button type="button"
                                        class="footer-action-btn"
                                        id="terminal-reset-btn"></button>
                                </li>
                                <li><button type="button"
                                        class="footer-action-btn footer-console-btn"
                                        data-console-open
                                        data-i18n="footer.console"></button></li>
                            </ul>
                        </div>
                    </section>
                </div>

                <p class="footer-copy" data-i18n-html="footer.copy"></p>
            </footer>
        </div>

        <button type="button" class="scrollback-btn" id="scrollback-btn"
            aria-label=""
            data-i18n-aria-label="scrollback.label"
            title=""
            data-i18n-title="scrollback.label">
            <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
        </button>

        <button type="button" class="console-restore-btn"
            id="console-restore-btn" hidden
            aria-label="" data-i18n-aria-label="footer.console"
            title="" data-i18n-title="footer.console">
            <span data-i18n="footer.console"></span>
        </button>

        <div class="console-window-layer" id="console-window-layer" hidden>
            <div class="console-window" id="console-window" role="dialog"
                aria-label=""
                data-i18n-aria-label="console.windowLabel">
                <div class="console-window-resize-handle handle-n"
                    data-resize-handle="n" aria-hidden="true"></div>
                <div class="console-window-resize-handle handle-e"
                    data-resize-handle="e" aria-hidden="true"></div>
                <div class="console-window-resize-handle handle-s"
                    data-resize-handle="s" aria-hidden="true"></div>
                <div class="console-window-resize-handle handle-w"
                    data-resize-handle="w" aria-hidden="true"></div>
                <div class="console-window-resize-handle handle-ne"
                    data-resize-handle="ne" aria-hidden="true"></div>
                <div class="console-window-resize-handle handle-se"
                    data-resize-handle="se" aria-hidden="true"></div>
                <div class="console-window-resize-handle handle-sw"
                    data-resize-handle="sw" aria-hidden="true"></div>
                <div class="console-window-resize-handle handle-nw"
                    data-resize-handle="nw" aria-hidden="true"></div>
                <iframe class="console-window-iframe"
                    id="console-window-iframe"
                    title=""
                    data-i18n-title="console.windowLabel"
                    src="about:blank"
                    loading="lazy"></iframe>
            </div>
        </div>

        <script src="scripts/ui/particles.js" defer></script>
        <script src="scripts/ui/terminal.js" defer></script>
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"
            defer></script>
        <script src="scripts/ui/animations.js" defer></script>
        <script type="module" src="scripts/main.js"></script>
    </body>
</html>
