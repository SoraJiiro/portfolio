<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://kit.fontawesome.com">
    <script type="module" defer src="../scripts/features/i18n.js"></script>
    <script type="module" defer src="../scripts/features/console.js"></script>
    <script src="https://kit.fontawesome.com/9a6b0f1631.js" crossorigin="anonymous" defer></script>
    <link rel="icon" type="image/png" href="../media/icon.png">
    <link rel="stylesheet" href="../styles/console.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ubuntu+Condensed&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Do+Hyeon&display=swap">
  </head>
  <body>
    <div class="console">
      <div class="c-header">
        <h1></h1>
        <ul>
          <li><button type="button" class="c-header-action" data-header-action="tab" aria-label="" title=""><i class="fa-solid fa-ellipsis" aria-hidden="true"></i></button></li>
          <li><button type="button" class="c-header-action" data-header-action="resize" aria-label="" title=""><i class="fa-solid fa-up-right-and-down-left-from-center" aria-hidden="true"></i></button></li>
          <li><button type="button" class="c-header-action" data-header-action="quit" aria-label="" title=""><i class="fa-solid fa-power-off" aria-hidden="true"></i></button></li>
        </ul>
      </div>
      <div class="c-content">
        <pre></pre>
        <section class="history">
          <div class="cmd-row is-focused">
            <span class="cmd-prompt">Admin@KA:~$</span>
            <span class="cmd-typed"></span>
            <span class="cmd-caret" aria-hidden="true"></span>
            <input type="text" class="cmd-input" maxlength="64" autocomplete="off" spellcheck="false" autofocus>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
